services:
  backend:
    command: sh -c "python manage.py migrate && python manage.py seed_demo_data --quiet && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DEBUG: "False"
    volumes: []

  frontend:
    volumes: []

  nginx:
    image: nginx:1.27-alpine
    container_name: sys_analiz_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
