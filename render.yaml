services:
  - type: web
    name: sys-analiz-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate && python manage.py seed_demo_data --quiet
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    healthCheckPath: /api/docs/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DB_HOST
        fromDatabase:
          name: sys-analiz-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sys-analiz-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sys-analiz-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sys-analiz-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sys-analiz-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sys-analiz-frontend.onrender.com,http://localhost:3000"

  - type: web
    name: sys-analiz-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: "https://sys-analiz-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sys-analiz-db
    plan: free
    region: frankfurt
    databaseName: sys_analiz
    user: sys_analiz
