services:
  - type: web
    name: sys-analiz-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: sh -c "python manage.py migrate && python manage.py seed_demo_data --quiet && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    healthCheckPath: /api/docs/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (paste your Neon connection string)
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sys-analiz-frontend.onrender.com,http://localhost:3000"

  - type: web
    name: sys-analiz-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://sys-analiz-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# databases section removed — using Neon external database via DATABASE_URL
